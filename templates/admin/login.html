{% extends "base.html" %}

{% block title %}Login - Monitor Bioterios{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold text-center mb-6">Login</h2>
    
    {% if error %}
    <p class="text-red-600 text-center mb-4">{{ error }}</p>
    {% endif %}
    
    <form method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Usuário</label>
            <input type="text" name="username" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:border-green-500 focus:ring-green-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Senha</label>
            <input type="password" name="password" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:border-green-500 focus:ring-green-500">
        </div>
        <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 transition">
            Entrar
        </button>
    </form>
</div>
{% endblock %}
