{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">Gerenciar Usuários</h1>

<table class="table table-dark table-striped table-hover">
    <thead>
        <tr>
            <th>Usuário</th>
            <th>Role</th>
            <th>Ativo</th>
            <th>Telefones (separar por vírgula)</th>
            <th>Biotérios permitidos (separar por vírgula)</th>
            <th>Ação</th>
        </tr>
    </thead>
    <tbody>
    {% for u in usuarios %}
        <tr>
            <td>{{ u[1] }}</td>
            <td>{{ u[2] }}</td>
            <td>{% if u[3] %}Sim{% else %}Não{% endif %}</td>
            <td>
                <form action="/admin/usuarios/atualizar/{{ u[0] }}" method="post" class="d-flex gap-2">
                    <input type="text" name="phones" value="{{ u[4] | default('') }}" class="form-control" placeholder="+55...">
            </td>
            <td>
                    <input type="text" name="bioterios" value="{{ u[5] | default('') }}" class="form-control" placeholder="Sala A, Sala B, ...">
            </td>
            <td>
                    <button type="submit" class="btn btn-sm btn-success">Salvar</button>
                </form>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
