<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Monitor Bioterios{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#10b981' } } }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-green-600 text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Monitor Bioterios</h1>
            <nav class="space-x-6">
                <a href="/" class="hover:underline {% if request.url.path == '/' %}font-bold underline{% endif %}">Dashboard</a>
                <a href="/historico" class="hover:underline {% if request.url.path == '/historico' %}font-bold underline{% endif %}">Histórico</a>
                <a href="/export-csv" class="bg-white hover:bg-gray-100 text-green-600 font-semibold py-1 px-4 rounded shadow-sm transition"> Exportar CSV </a>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-auto">
        <p>&copy; 2026 - Sistema de Monitoramento de Biotérios</p>
    </footer>
</body>
</html>
