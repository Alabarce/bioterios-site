{% extends "base.html" %}

{% block content %}
<div class="container mx-auto p-6">
    <h1 class="text-2xl font-bold mb-6">Últimas Leituras (até 150 mais recentes)</h1>
    <div class="overflow-x-auto">
        <table class="min-w-full bg-white border border-gray-300">
            <thead>
                <tr class="bg-green-600 text-white">
                    {% for header in headers %}
                    <th class="py-2 px-4 border-b border-gray-300">{{ header }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr class="{% if loop.index0 % 2 == 0 %}bg-gray-50{% endif %}">
                    {% for cell in row %}
                    <td class="py-2 px-4 border-b border-gray-300 text-center">
                        {{ cell if cell is not none else '' }}
                    </td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div> 

{% endblock %}
