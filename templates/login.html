{% extends "base.html" %}
{% block title %}Login - Monibiot{% endblock %}

{% set is_login_page = True %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card shadow border-0 mt-5">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <i class="bi bi-droplet text-primary fs-1"></i>
                        <h2 class="mt-3 fw-semibold">Monibiot</h2>
                        <p class="text-muted">Sistema de controle de temperatura, umidade e iluminação</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger text-center">{{ error }}</div>
                    {% endif %}

                    <form method="post">
                        <div class="mb-4">
                            <label class="form-label fw-medium">Usuário</label>
                            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium">Senha</label>
                            <input type="password" name="password" class="form-control form-control-lg" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-medium">
                            Entrar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
